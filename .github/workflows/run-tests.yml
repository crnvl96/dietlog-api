name: Run Tests
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  uv:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.24"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: run tests
        run: uv run pytest
